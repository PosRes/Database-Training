<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | ILI Database</title>
    <link rel="stylesheet" href="style.css?v=5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .user-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            margin-bottom: 0.75rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            transition: all 0.2s ease;
        }
        .user-card:hover { background: rgba(255, 255, 255, 0.06); }
        .user-info { flex: 1; }
        .user-info .name { font-weight: 600; color: white; font-size: 1rem; }
        .user-info .email { color: var(--text-muted); font-size: 0.85rem; margin-top: 2px; }
        .user-info .date { color: var(--text-muted); font-size: 0.75rem; margin-top: 4px; opacity: 0.6; }
        .user-actions { display: flex; gap: 8px; }
        .btn-approve {
            padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; font-family: inherit;
            background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3);
            transition: all 0.2s ease;
        }
        .btn-approve:hover { background: rgba(34, 197, 94, 0.3); }
        .btn-reject {
            padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; font-family: inherit;
            background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3);
            transition: all 0.2s ease;
        }
        .btn-reject:hover { background: rgba(239, 68, 68, 0.3); }
        .status-badge {
            display: inline-block; padding: 4px 10px; border-radius: 6px;
            font-size: 0.75rem; font-weight: 600; margin-left: 10px;
        }
        .status-pending { background: rgba(234, 179, 8, 0.15); color: #eab308; }
        .status-approved { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .status-rejected { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin: 2rem 0 1rem; color: var(--text-muted); }
        .no-users { text-align: center; padding: 2rem; color: var(--text-muted); opacity: 0.6; }
        .tab-bar { display: flex; gap: 4px; margin-bottom: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 4px; }
        .tab-btn {
            flex: 1; padding: 10px; text-align: center; border-radius: 8px; border: none;
            background: transparent; color: var(--text-muted); cursor: pointer;
            font-family: inherit; font-size: 0.85rem; font-weight: 500; transition: all 0.2s ease;
        }
        .tab-btn.active { background: var(--primary); color: white; }
    </style>
</head>
<body class="dark-theme">
    <div class="app-container">
        <header>
            <div class="logo-section">
                <h1>Admin <span>Panel</span></h1>
                <p class="subtitle">Manage User Registrations</p>
            </div>
            <div class="header-actions">
                <a href="index.html" class="btn-secondary">Back to Dashboard</a>
            </div>
        </header>

        <main>
            <div class="tab-bar">
                <button class="tab-btn active" onclick="showTab('pending')">⏳ Pending</button>
                <button class="tab-btn" onclick="showTab('approved')">✅ Approved</button>
                <button class="tab-btn" onclick="showTab('rejected')">❌ Rejected</button>
            </div>

            <div class="glass" style="padding: 1.5rem; border-radius: 16px;">
                <div id="userList">
                    <p class="no-users">Loading users...</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 By Kaisar Akhmad K. Confidential Information.</p>
        </footer>
    </div>

    <script src="auth.js?v=5"></script>
    <script>
        let allUsers = [];
        let currentTab = 'pending';

        async function init() {
            const session = await requireAuth();
            if (!session) return;

            // Check if current user is admin
            const { data: profile } = await _supabase
                .from('user_profiles')
                .select('role')
                .eq('id', session.user.id)
                .single();

            if (!profile || profile.role !== 'admin') {
                alert('⛔ Access Denied. Admin only.');
                window.location.href = 'index.html';
                return;
            }

            await loadUsers();
        }

        async function loadUsers() {
            const { data, error } = await _supabase
                .from('user_profiles')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('userList').innerHTML = 
                    '<p class="no-users" style="color:#ef4444;">Error: ' + error.message + '</p>';
                return;
            }

            allUsers = data || [];
            renderUsers();
        }

        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderUsers();
        }

        function renderUsers() {
            const filtered = allUsers.filter(u => u.status === currentTab);
            const container = document.getElementById('userList');

            if (filtered.length === 0) {
                container.innerHTML = '<p class="no-users">No ' + currentTab + ' users.</p>';
                return;
            }

            container.innerHTML = filtered.map(user => `
                <div class="user-card">
                    <div class="user-info">
                        <div class="name">${user.full_name || 'Unknown'} 
                            <span class="status-badge status-${user.status}">${user.status}</span>
                        </div>
                        <div class="email">${user.email}</div>
                        <div class="date">Registered: ${new Date(user.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
                    </div>
                    <div class="user-actions">
                        ${user.status !== 'approved' ? `<button class="btn-approve" onclick="updateStatus('${user.id}', 'approved')">✅ Approve</button>` : ''}
                        ${user.status !== 'rejected' ? `<button class="btn-reject" onclick="updateStatus('${user.id}', 'rejected')">❌ Reject</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        window.updateStatus = async (userId, newStatus) => {
            const { error } = await _supabase
                .from('user_profiles')
                .update({ status: newStatus })
                .eq('id', userId);

            if (error) {
                alert('Error: ' + error.message);
                return;
            }

            // Update local data and re-render
            const user = allUsers.find(u => u.id === userId);
            if (user) user.status = newStatus;
            renderUsers();
        };

        init();
    </script>
</body>
</html>
